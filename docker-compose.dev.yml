services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${COLINK_DB_USER:-colink}
      POSTGRES_PASSWORD: ${COLINK_DB_PASSWORD:-colink_dev}
      POSTGRES_DB: ${COLINK_DB_NAME:-colink}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COLINK_DB_USER:-colink} -d ${COLINK_DB_NAME:-colink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - colink

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${COLINK_HTTP_PROXY:-}
        HTTPS_PROXY: ${COLINK_HTTPS_PROXY:-}
        NO_PROXY: ${COLINK_NO_PROXY:-localhost,127.0.0.1,postgres}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${COLINK_SERVER_PORT:-8080}:8080"
    environment:
      SERVER_MODE: debug
      SERVER_PORT: 8080
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${COLINK_DB_USER:-colink}
      DATABASE_PASSWORD: ${COLINK_DB_PASSWORD:-colink_dev}
      DATABASE_DBNAME: ${COLINK_DB_NAME:-colink}
      DATABASE_SSLMODE: disable
      JWT_SECRET: ${COLINK_JWT_SECRET:-dev-jwt-secret}
      JWT_ACCESS_TTL: ${COLINK_JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${COLINK_JWT_REFRESH_TTL:-720h}
      WS_TICKET_TTL: ${COLINK_WS_TICKET_TTL:-30s}
      UPDATE_CHECK_INTERVAL: ${COLINK_UPDATE_CHECK_INTERVAL:-30m}
      UPDATE_STORAGE_PATH: /app/data/updates
      UPDATE_GITHUB_TOKEN: ${COLINK_GITHUB_TOKEN:-}
      UPDATE_GITHUB_REPOS: ${COLINK_GITHUB_REPOS:-CoLinkDev:colink-android:android,CoLinkDev:colink-desktop:windows}
      HTTP_PROXY: ${COLINK_HTTP_PROXY:-}
      HTTPS_PROXY: ${COLINK_HTTPS_PROXY:-}
      NO_PROXY: ${COLINK_NO_PROXY:-localhost,127.0.0.1,postgres}
    volumes:
      - update-data:/app/data/updates
    networks:
      - colink

volumes:
  pgdata:
  update-data:

networks:
  colink:
    driver: bridge
