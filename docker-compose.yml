x-colink-image: &colink-image
  image: ${COLINK_SERVER_IMAGE:-colink-server:latest}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      HTTP_PROXY: ${COLINK_HTTP_PROXY:-}
      HTTPS_PROXY: ${COLINK_HTTPS_PROXY:-}
      NO_PROXY: ${COLINK_NO_PROXY:-localhost,127.0.0.1,postgres}

x-colink-db-env: &colink-db-env
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_USER: ${COLINK_DB_USER:-colink}
  DATABASE_PASSWORD: ${COLINK_DB_PASSWORD:-colink}
  DATABASE_SSLMODE: disable

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${COLINK_DB_USER:-colink}
      POSTGRES_PASSWORD: ${COLINK_DB_PASSWORD:?COLINK_DB_PASSWORD is required}
      POSTGRES_DB: ${COLINK_MAIN_DB_NAME:-${COLINK_DB_NAME:-colink}}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COLINK_DB_USER:-colink} -d ${COLINK_MAIN_DB_NAME:-${COLINK_DB_NAME:-colink}}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - colink

  server:
    <<: *colink-image
    command: ["colink-server"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_MODE: release
      SERVER_PORT: 8080
      <<: *colink-db-env
      DATABASE_DBNAME: ${COLINK_MAIN_DB_NAME:-${COLINK_DB_NAME:-colink}}
      JWT_SECRET: ${COLINK_JWT_SECRET:?COLINK_JWT_SECRET is required}
      JWT_ACCESS_TTL: ${COLINK_JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${COLINK_JWT_REFRESH_TTL:-720h}
      WS_TICKET_TTL: ${COLINK_WS_TICKET_TTL:-30s}
    networks:
      - colink

  update:
    <<: *colink-image
    command: ["colink-update-server"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_MODE: release
      SERVER_PORT: 8081
      <<: *colink-db-env
      DATABASE_DBNAME: ${COLINK_UPDATE_DB_NAME:-colink_update}
      UPDATE_CHECK_INTERVAL: ${COLINK_UPDATE_CHECK_INTERVAL:-30m}
      UPDATE_STORAGE_PATH: /app/data/updates
      UPDATE_GITHUB_TOKEN: ${COLINK_GITHUB_TOKEN:-}
      UPDATE_GITHUB_REPOS: ${COLINK_GITHUB_REPOS:-CoLinkDev:colink-android:android,CoLinkDev:colink-desktop:windows}
      HTTP_PROXY: ${COLINK_HTTP_PROXY:-}
      HTTPS_PROXY: ${COLINK_HTTPS_PROXY:-}
      NO_PROXY: ${COLINK_NO_PROXY:-localhost,127.0.0.1,postgres,server,update}
    volumes:
      - update-data:/app/data/updates
    networks:
      - colink

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - server
      - update
    ports:
      - "${COLINK_SERVER_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - colink

volumes:
  pgdata:
  update-data:

networks:
  colink:
    driver: bridge
