x-colink-image: &colink-image
  image: ghcr.io/colinkdev/colink-server:latest

x-colink-db-env: &colink-db-env
  COLINK_DATABASE_HOST: postgres
  COLINK_DATABASE_PORT: 5432
  COLINK_DATABASE_USER: colink
  COLINK_DATABASE_PASSWORD: colink
  COLINK_DATABASE_SSLMODE: disable
  COLINK_DATABASE_CONNECT_TIMEOUT: 2m

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: colink
      POSTGRES_PASSWORD: colink
      POSTGRES_DB: colink
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colink -d colink"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - colink

  server:
    <<: *colink-image
    command: ["colink-server"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COLINK_SERVER_MODE: release
      COLINK_SERVER_PORT: 8080
      <<: *colink-db-env
      COLINK_DATABASE_DBNAME: colink
      COLINK_JWT_SECRET: ${COLINK_JWT_SECRET:?COLINK_JWT_SECRET is required}
      COLINK_JWT_ACCESS_TTL: ${COLINK_JWT_ACCESS_TTL:-72h}
      COLINK_JWT_REFRESH_TTL: ${COLINK_JWT_REFRESH_TTL:-720h}
      COLINK_WS_TICKET_TTL: ${COLINK_WS_TICKET_TTL:-30s}
    networks:
      - colink

  update:
    <<: *colink-image
    command: ["colink-update-server"]
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COLINK_SERVER_MODE: release
      COLINK_SERVER_PORT: 8081
      <<: *colink-db-env
      COLINK_DATABASE_DBNAME: colink_update
      COLINK_UPDATE_CHECK_INTERVAL: ${COLINK_UPDATE_CHECK_INTERVAL:-30m}
      COLINK_UPDATE_STORAGE_PATH: /app/data/updates
      COLINK_UPDATE_GITHUB_TOKEN: ${COLINK_UPDATE_GITHUB_TOKEN:-}
      COLINK_UPDATE_GITHUB_REPOS: ${COLINK_UPDATE_GITHUB_REPOS:-CoLinkDev:colink-android:android,CoLinkDev:colink-desktop:windows}
      COLINK_HTTP_PROXY: ${COLINK_HTTP_PROXY:-}
      COLINK_HTTPS_PROXY: ${COLINK_HTTPS_PROXY:-}
      COLINK_NO_PROXY: ${COLINK_NO_PROXY:-localhost,127.0.0.1,postgres,server,update}
    volumes:
      - update-data:/app/data/updates
    networks:
      - colink

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - server
      - update
    ports:
      - "${COLINK_PUBLIC_PORT:-37777}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - colink

volumes:
  pgdata:
  update-data:

networks:
  colink:
    driver: bridge
